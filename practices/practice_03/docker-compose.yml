services:
  db:
    image: postgres:16-alpine
    container_name: weatherservice-postgres
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weatherservice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weatherservice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
